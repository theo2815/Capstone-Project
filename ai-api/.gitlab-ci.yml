stages:
  - test
  - build

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

# --------------- Test Stage ---------------

lint:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install --no-cache-dir ruff
  script:
    - ruff check src/ tests/

typecheck:
  stage: test
  image: python:3.12-slim
  before_script:
    - pip install --no-cache-dir -e ".[dev]"
  script:
    - mypy src/ --ignore-missing-imports
  allow_failure: true

unit-tests:
  stage: test
  image: python:3.12-slim
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends libgl1 libglib2.0-0 libgomp1
    - pip install --no-cache-dir -e ".[dev]"
  script:
    - pytest tests/unit/ -v --cov=src --cov-report=term-missing --cov-fail-under=50
  artifacts:
    reports:
      junit: junit.xml
    when: always

# --------------- Build Stage ---------------

build-image:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -f Dockerfile -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" -t "$CI_REGISTRY_IMAGE:latest" .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
    - docker push "$CI_REGISTRY_IMAGE:latest"
  only:
    - main
